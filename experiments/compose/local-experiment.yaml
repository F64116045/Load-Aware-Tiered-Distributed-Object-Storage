services:
  meta_service_1:
    environment:
      AGE_THRESHOLD_SEC: "${AGE_THRESHOLD_SEC:-0}"

  meta_service_2:
    environment:
      AGE_THRESHOLD_SEC: "${AGE_THRESHOLD_SEC:-0}"

  meta_service_3:
    environment:
      AGE_THRESHOLD_SEC: "${AGE_THRESHOLD_SEC:-0}"

  tiering_worker:
    environment:
      META_ENABLED: "true"
      META_ENDPOINT: "http://meta_service:8091"
      META_REQUIRE_ENDPOINT: "true"
      META_RPC_AUTH_TOKEN: "dev-meta-token"
      META_DSN: "${META_DSN:-}"
      TIERING_WORKER_POLL_SEC: "${TIERING_WORKER_POLL_SEC:-2}"
      TIERING_POLICY_PERIOD_SEC: "${TIERING_POLICY_PERIOD_SEC:-5}"
      TIERING_POLICY_VARIANT: "${TIERING_POLICY_VARIANT:-A}"
      TIERING_TRIGGER_MODE: "${TIERING_TRIGGER_MODE:-periodic}"
      TIERING_THRESHOLD_CHECK_SEC: "${TIERING_THRESHOLD_CHECK_SEC:-5}"
      TIERING_THRESHOLD_COOLDOWN_SEC: "${TIERING_THRESHOLD_COOLDOWN_SEC:-5}"
      TIERING_IDLE_STABLE_ROUNDS: "${TIERING_IDLE_STABLE_ROUNDS:-3}"
      TIERING_IDLE_CPU_PCT: "${TIERING_IDLE_CPU_PCT:-70}"
      TIERING_IDLE_MEMORY_PCT: "${TIERING_IDLE_MEMORY_PCT:-90}"
      TIERING_IDLE_IOWAIT_PCT: "${TIERING_IDLE_IOWAIT_PCT:-20}"
      TIERING_IDLE_QUEUE_DEPTH: "${TIERING_IDLE_QUEUE_DEPTH:-16}"
      TIERING_IDLE_MIN_NODE_RATIO: "${TIERING_IDLE_MIN_NODE_RATIO:-0.8}"
      TIERING_IDLE_MIN_NODE_COUNT: "${TIERING_IDLE_MIN_NODE_COUNT:-4}"
      AGE_THRESHOLD_SEC: "${AGE_THRESHOLD_SEC:-0}"
      MAX_OBJECTS_PER_ROUND: "${MAX_OBJECTS_PER_ROUND:-200}"
      MAX_BYTES_PER_ROUND: "${MAX_BYTES_PER_ROUND:-1073741824}"
      HOT_PRESSURE_DISK_PCT: "${HOT_PRESSURE_DISK_PCT:-80}"
      HOT_PRESSURE_QUEUE_DEPTH: "${HOT_PRESSURE_QUEUE_DEPTH:-1000}"
      TIERING_POLICY_LEADER_RETRY_SEC: "${TIERING_POLICY_LEADER_RETRY_SEC:-2}"
      TIERING_POLICY_LEADER_LOCK_KEY: "${TIERING_POLICY_LEADER_LOCK_KEY:-42042}"
      TIERING_LEADER_STALE_SEC: "${TIERING_LEADER_STALE_SEC:-10}"
      TIERING_TASK_MAX_RETRY_COUNT: "${TIERING_TASK_MAX_RETRY_COUNT:-8}"
      TIERING_WORKER_TASK_TYPE: "${TIERING_WORKER_TASK_TYPE:-ALL}"
      WORKER_BW_LIMIT_MBPS: "${WORKER_BW_LIMIT_MBPS:-0}"
      WORKER_EC_SHARD_WRITE_PARALLELISM: "${WORKER_EC_SHARD_WRITE_PARALLELISM:-2}"
      REPAIR_SCAN_ENABLED: "${REPAIR_SCAN_ENABLED:-false}"
      OLD_VERSION_REAPER_ENABLED: "${OLD_VERSION_REAPER_ENABLED:-false}"
      TIERING_TASK_HISTORY_REAPER_ENABLED: "${TIERING_TASK_HISTORY_REAPER_ENABLED:-false}"
