events {}

http {
  upstream meta_rpc {
    least_conn;
    server meta_service_1:8091 max_fails=2 fail_timeout=3s;
    server meta_service_2:8091 max_fails=2 fail_timeout=3s;
    server meta_service_3:8091 max_fails=2 fail_timeout=3s;
    keepalive 64;
  }

  server {
    listen 8091;

    location / {
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_connect_timeout 2s;
      proxy_read_timeout 15s;
      proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
      proxy_next_upstream_tries 3;
      proxy_pass http://meta_rpc;
    }
  }
}
