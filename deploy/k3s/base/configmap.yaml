apiVersion: v1
kind: ConfigMap
metadata:
  name: rec-store-config
data:
  META_ENABLED: "true"
  META_REQUIRE_ENDPOINT: "true"
  META_ENDPOINT: "http://meta-service:8091"
  META_DSN: ""
  HOT_REPLICA_COUNT: "3"
  HOT_WRITE_QUORUM: "2"
  STORAGE_IO_WORKERS: "1"
  STORAGE_MAX_QUEUED_WRITE_BYTES: "536870912"
  NODE_HEARTBEAT_INTERVAL_SEC: "3"
  NODE_HEARTBEAT_STALE_SEC: "15"
  TIERING_LEADER_STALE_SEC: "10"
  WORKER_EC_SHARD_WRITE_PARALLELISM: "2"
