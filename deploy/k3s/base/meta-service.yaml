apiVersion: v1
kind: Service
metadata:
  name: meta-service
  labels:
    app: meta-service
spec:
  ports:
    - name: http
      port: 8091
      targetPort: 8091
  selector:
    app: meta-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: meta-service
  labels:
    app: meta-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: meta-service
  template:
    metadata:
      labels:
        app: meta-service
    spec:
      containers:
        - name: meta-service
          image: rec-store-image
          imagePullPolicy: IfNotPresent
          command:
            - /usr/local/bin/meta_service
          env:
            - name: META_ENABLED
              value: "true"
            - name: META_REQUIRE_ENDPOINT
              value: "false"
            - name: META_DSN
              value: "pd:2379"
            - name: META_SERVICE_PORT
              value: "8091"
            - name: META_STARTUP_PING_TIMEOUT_SEC
              value: "10"
            - name: META_STARTUP_MAX_WAIT_SEC
              value: "300"
            - name: META_STARTUP_RETRY_INTERVAL_SEC
              value: "2"
            - name: META_STARTUP_MAX_RETRY_INTERVAL_SEC
              value: "15"
            - name: META_HEALTH_PING_TIMEOUT_SEC
              value: "5"
            - name: META_RPC_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: rec-store-secret
                  key: META_RPC_AUTH_TOKEN
          ports:
            - name: http
              containerPort: 8091
          readinessProbe:
            httpGet:
              path: /health
              port: 8091
            initialDelaySeconds: 10
            periodSeconds: 5
