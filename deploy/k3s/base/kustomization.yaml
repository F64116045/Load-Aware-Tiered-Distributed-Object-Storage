apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: rec-store

resources:
  - namespace.yaml
  - secret.yaml
  - configmap.yaml
  - pd.yaml
  - tikv.yaml
  - meta-service.yaml
  - storage-nodes.yaml
  - api.yaml
  - tiering-worker.yaml

images:
  - name: rec-store-image
    newName: localhost/rec-store
    newTag: dev
