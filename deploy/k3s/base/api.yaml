apiVersion: v1
kind: Service
metadata:
  name: api
  labels:
    app: api
spec:
  type: NodePort
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      nodePort: 30080
  selector:
    app: api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  labels:
    app: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: rec-store-image
          imagePullPolicy: IfNotPresent
          command:
            - /usr/local/bin/api
          envFrom:
            - configMapRef:
                name: rec-store-config
          env:
            - name: NODE_NAMES_CSV
              value: storage-node-0.storage-node,storage-node-1.storage-node,storage-node-2.storage-node,storage-node-3.storage-node,storage-node-4.storage-node,storage-node-5.storage-node
            - name: META_RPC_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: rec-store-secret
                  key: META_RPC_AUTH_TOKEN
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
