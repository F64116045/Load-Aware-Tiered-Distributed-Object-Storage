apiVersion: v1
kind: Service
metadata:
  name: pd
  labels:
    app: pd
spec:
  ports:
    - name: client
      port: 2379
      targetPort: 2379
    - name: peer
      port: 2380
      targetPort: 2380
  selector:
    app: pd
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: pd
  labels:
    app: pd
spec:
  serviceName: pd
  replicas: 1
  selector:
    matchLabels:
      app: pd
  template:
    metadata:
      labels:
        app: pd
    spec:
      containers:
        - name: pd
          image: pingcap/pd:v7.5.0
          args:
            - --name=pd
            - --data-dir=/var/lib/pd
            - --client-urls=http://0.0.0.0:2379
            - --advertise-client-urls=http://pd:2379
            - --peer-urls=http://0.0.0.0:2380
            - --advertise-peer-urls=http://pd:2380
            - --initial-cluster=pd=http://pd:2380
            - --log-level=info
          ports:
            - name: client
              containerPort: 2379
            - name: peer
              containerPort: 2380
          volumeMounts:
            - name: data
              mountPath: /var/lib/pd
          readinessProbe:
            tcpSocket:
              port: 2379
            initialDelaySeconds: 10
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
