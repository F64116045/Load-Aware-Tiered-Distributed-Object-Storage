services:
  # ---------------------------------------------------------------------------
  # Load Balancer
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "8000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - storage_net

  # ---------------------------------------------------------------------------
  # Metadata DB (PostgreSQL)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=metadata
      - POSTGRES_USER=metadata
      - POSTGRES_PASSWORD=metadata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metadata -d metadata"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - storage_net

  # ---------------------------------------------------------------------------
  # Metadata Migration (run-on-demand)
  # ---------------------------------------------------------------------------
  meta_migrate:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/usr/local/bin/meta_migrate"]
    environment:
      - META_ENABLED=true
      - META_DRIVER=postgres
      - META_DSN=postgres://metadata:metadata@postgres:5432/metadata?sslmode=disable
      - META_MAX_OPEN_CONNS=5
      - META_MAX_IDLE_CONNS=2
      - META_CONN_MAX_LIFETIME_SEC=60
      - META_MIGRATE_ACTION=up
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - storage_net
    restart: "no"

  # ---------------------------------------------------------------------------
  # API Gateway Cluster
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: on-failure
    deploy:
      replicas: 3
    environment:
      - NODE_NAMES_CSV=storage_node_1,storage_node_2,storage_node_3,storage_node_4,storage_node_5,storage_node_6
      - META_ENABLED=true
      - META_DRIVER=postgres
      - META_DSN=postgres://metadata:metadata@postgres:5432/metadata?sslmode=disable
      - META_MAX_OPEN_CONNS=20
      - META_MAX_IDLE_CONNS=10
      - META_CONN_MAX_LIFETIME_SEC=300
      - NODE_HEARTBEAT_STALE_SEC=15
    depends_on:
      postgres:
        condition: service_healthy
      storage_node_1:
        condition: service_started
      storage_node_2:
        condition: service_started
      storage_node_3:
        condition: service_started
      storage_node_4:
        condition: service_started
      storage_node_5:
        condition: service_started
      storage_node_6:
        condition: service_started
    command: ["/usr/local/bin/api"]
    networks:
      - storage_net

  # ---------------------------------------------------------------------------
  # Storage Nodes (Data Layer)
  # ---------------------------------------------------------------------------
  storage_node_1:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/usr/local/bin/storage_node"]
    environment:
      - NODE_NAME=storage_node_1
      - NODE_PORT=8001
      - STORAGE_DIR=/data/node1
      - META_ENABLED=true
      - META_DRIVER=postgres
      - META_DSN=postgres://metadata:metadata@postgres:5432/metadata?sslmode=disable
      - META_MAX_OPEN_CONNS=10
      - META_MAX_IDLE_CONNS=5
      - META_CONN_MAX_LIFETIME_SEC=300
      - NODE_HEARTBEAT_INTERVAL_SEC=3
    volumes:
      - storage_data_1:/data/node1
    networks:
      - storage_net

  storage_node_2:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/usr/local/bin/storage_node"]
    environment:
      - NODE_NAME=storage_node_2
      - NODE_PORT=8002
      - STORAGE_DIR=/data/node2
      - META_ENABLED=true
      - META_DRIVER=postgres
      - META_DSN=postgres://metadata:metadata@postgres:5432/metadata?sslmode=disable
      - META_MAX_OPEN_CONNS=10
      - META_MAX_IDLE_CONNS=5
      - META_CONN_MAX_LIFETIME_SEC=300
      - NODE_HEARTBEAT_INTERVAL_SEC=3
    volumes:
      - storage_data_2:/data/node2
    networks:
      - storage_net

  storage_node_3:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/usr/local/bin/storage_node"]
    environment:
      - NODE_NAME=storage_node_3
      - NODE_PORT=8003
      - STORAGE_DIR=/data/node3
      - META_ENABLED=true
      - META_DRIVER=postgres
      - META_DSN=postgres://metadata:metadata@postgres:5432/metadata?sslmode=disable
      - META_MAX_OPEN_CONNS=10
      - META_MAX_IDLE_CONNS=5
      - META_CONN_MAX_LIFETIME_SEC=300
      - NODE_HEARTBEAT_INTERVAL_SEC=3
    volumes:
      - storage_data_3:/data/node3
    networks:
      - storage_net

  storage_node_4:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/usr/local/bin/storage_node"]
    environment:
      - NODE_NAME=storage_node_4
      - NODE_PORT=8004
      - STORAGE_DIR=/data/node4
      - META_ENABLED=true
      - META_DRIVER=postgres
      - META_DSN=postgres://metadata:metadata@postgres:5432/metadata?sslmode=disable
      - META_MAX_OPEN_CONNS=10
      - META_MAX_IDLE_CONNS=5
      - META_CONN_MAX_LIFETIME_SEC=300
      - NODE_HEARTBEAT_INTERVAL_SEC=3
    volumes:
      - storage_data_4:/data/node4
    networks:
      - storage_net

  storage_node_5:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/usr/local/bin/storage_node"]
    environment:
      - NODE_NAME=storage_node_5
      - NODE_PORT=8005
      - STORAGE_DIR=/data/node5
      - META_ENABLED=true
      - META_DRIVER=postgres
      - META_DSN=postgres://metadata:metadata@postgres:5432/metadata?sslmode=disable
      - META_MAX_OPEN_CONNS=10
      - META_MAX_IDLE_CONNS=5
      - META_CONN_MAX_LIFETIME_SEC=300
      - NODE_HEARTBEAT_INTERVAL_SEC=3
    volumes:
      - storage_data_5:/data/node5
    networks:
      - storage_net

  storage_node_6:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/usr/local/bin/storage_node"]
    environment:
      - NODE_NAME=storage_node_6
      - NODE_PORT=8006
      - STORAGE_DIR=/data/node6
      - META_ENABLED=true
      - META_DRIVER=postgres
      - META_DSN=postgres://metadata:metadata@postgres:5432/metadata?sslmode=disable
      - META_MAX_OPEN_CONNS=10
      - META_MAX_IDLE_CONNS=5
      - META_CONN_MAX_LIFETIME_SEC=300
      - NODE_HEARTBEAT_INTERVAL_SEC=3
    volumes:
      - storage_data_6:/data/node6
    networks:
      - storage_net

  # ---------------------------------------------------------------------------
  # Tiering Worker
  # ---------------------------------------------------------------------------
  tiering_worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/usr/local/bin/tiering_worker"]
    restart: on-failure
    environment:
      - META_ENABLED=true
      - META_DRIVER=postgres
      - META_DSN=postgres://metadata:metadata@postgres:5432/metadata?sslmode=disable
      - META_MAX_OPEN_CONNS=10
      - META_MAX_IDLE_CONNS=5
      - META_CONN_MAX_LIFETIME_SEC=300
      - TIERING_WORKER_POLL_SEC=2
      - TIERING_POLICY_PERIOD_SEC=300
      - TIERING_WORKER_TASK_TYPE=ALL
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - storage_net

networks:
  storage_net:
    driver: bridge

volumes:
  postgres_data:
  storage_data_1:
  storage_data_2:
  storage_data_3:
  storage_data_4:
  storage_data_5:
  storage_data_6:
