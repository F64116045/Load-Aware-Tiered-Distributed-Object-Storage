services:
  # ---------------------------------------------------------------------------
  # Load Balancer
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "8000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - storage_net

  # ---------------------------------------------------------------------------
  # Metadata Service HA (3 replicas + internal LB)
  # ---------------------------------------------------------------------------
  meta_service_1:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/usr/local/bin/meta_service"]
    restart: on-failure
    environment:
      - META_ENABLED=true
      - META_REQUIRE_ENDPOINT=false
      - META_RPC_AUTH_TOKEN=dev-meta-token
      - META_DSN=${META_DSN:-pd:2379}
      - META_SERVICE_PORT=8091
      - META_STARTUP_PING_TIMEOUT_SEC=10
      - META_STARTUP_MAX_WAIT_SEC=300
      - META_STARTUP_RETRY_INTERVAL_SEC=2
      - META_STARTUP_MAX_RETRY_INTERVAL_SEC=15
      - META_HEALTH_PING_TIMEOUT_SEC=5
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8091/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    depends_on:
      pd:
        condition: service_started
      tikv:
        condition: service_started
    networks:
      - storage_net

  meta_service_2:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/usr/local/bin/meta_service"]
    restart: on-failure
    environment:
      - META_ENABLED=true
      - META_REQUIRE_ENDPOINT=false
      - META_RPC_AUTH_TOKEN=dev-meta-token
      - META_DSN=${META_DSN:-pd:2379}
      - META_SERVICE_PORT=8091
      - META_STARTUP_PING_TIMEOUT_SEC=10
      - META_STARTUP_MAX_WAIT_SEC=300
      - META_STARTUP_RETRY_INTERVAL_SEC=2
      - META_STARTUP_MAX_RETRY_INTERVAL_SEC=15
      - META_HEALTH_PING_TIMEOUT_SEC=5
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8091/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    depends_on:
      pd:
        condition: service_started
      tikv:
        condition: service_started
    networks:
      - storage_net

  meta_service_3:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/usr/local/bin/meta_service"]
    restart: on-failure
    environment:
      - META_ENABLED=true
      - META_REQUIRE_ENDPOINT=false
      - META_RPC_AUTH_TOKEN=dev-meta-token
      - META_DSN=${META_DSN:-pd:2379}
      - META_SERVICE_PORT=8091
      - META_STARTUP_PING_TIMEOUT_SEC=10
      - META_STARTUP_MAX_WAIT_SEC=300
      - META_STARTUP_RETRY_INTERVAL_SEC=2
      - META_STARTUP_MAX_RETRY_INTERVAL_SEC=15
      - META_HEALTH_PING_TIMEOUT_SEC=5
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8091/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    depends_on:
      pd:
        condition: service_started
      tikv:
        condition: service_started
    networks:
      - storage_net

  meta_service:
    image: nginx:1.25-alpine
    restart: on-failure
    volumes:
      - ./deploy/meta_lb/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8091/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    depends_on:
      meta_service_1:
        condition: service_started
      meta_service_2:
        condition: service_started
      meta_service_3:
        condition: service_started
    networks:
      - storage_net

  # ---------------------------------------------------------------------------
  # TiKV Metadata Cluster
  # ---------------------------------------------------------------------------
  pd:
    image: pingcap/pd:v7.5.0
    command:
      - --name=pd
      - --data-dir=/var/lib/pd
      - --client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://pd:2379
      - --peer-urls=http://0.0.0.0:2380
      - --advertise-peer-urls=http://pd:2380
      - --initial-cluster=pd=http://pd:2380
      - --log-level=info
    restart: on-failure
    volumes:
      - tikv_pd_data:/var/lib/pd
    networks:
      - storage_net

  tikv:
    image: pingcap/tikv:v7.5.0
    command:
      - --pd=pd:2379
      - --addr=0.0.0.0:20160
      - --advertise-addr=tikv:20160
      - --status-addr=0.0.0.0:20180
      - --data-dir=/var/lib/tikv
      - --log-level=info
    depends_on:
      - pd
    restart: on-failure
    volumes:
      - tikv_store_data:/var/lib/tikv
    networks:
      - storage_net

  # ---------------------------------------------------------------------------
  # API Gateway Cluster
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: on-failure
    deploy:
      replicas: 3
    environment:
      - NODE_NAMES_CSV=storage_node_1,storage_node_2,storage_node_3,storage_node_4,storage_node_5,storage_node_6
      - META_ENABLED=true
      - META_ENDPOINT=http://meta_service:8091
      - META_REQUIRE_ENDPOINT=true
      - META_RPC_AUTH_TOKEN=dev-meta-token
      - META_DSN=${META_DSN:-}
      - HOT_REPLICA_COUNT=3
      - HOT_WRITE_QUORUM=2
      - NODE_HEARTBEAT_STALE_SEC=15
      - TIERING_LEADER_STALE_SEC=10
    depends_on:
      meta_service:
        condition: service_healthy
      storage_node_1:
        condition: service_started
      storage_node_2:
        condition: service_started
      storage_node_3:
        condition: service_started
      storage_node_4:
        condition: service_started
      storage_node_5:
        condition: service_started
      storage_node_6:
        condition: service_started
    command: ["/usr/local/bin/api"]
    networks:
      - storage_net

  # ---------------------------------------------------------------------------
  # Storage Nodes (Data Layer)
  # ---------------------------------------------------------------------------
  storage_node_1:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/usr/local/bin/storage_node"]
    restart: on-failure
    depends_on:
      meta_service:
        condition: service_healthy
    environment:
      - NODE_NAME=storage_node_1
      - NODE_PORT=8001
      - STORAGE_DIR=/data/node1
      - META_ENABLED=true
      - META_ENDPOINT=http://meta_service:8091
      - META_REQUIRE_ENDPOINT=true
      - META_RPC_AUTH_TOKEN=dev-meta-token
      - META_DSN=${META_DSN:-}
      - NODE_HEARTBEAT_INTERVAL_SEC=3
      - STORAGE_IO_WORKERS=${STORAGE_IO_WORKERS:-2}
      - STORAGE_DURABILITY_MODE=${STORAGE_DURABILITY_MODE:-sync}
    volumes:
      - storage_data_1:/data/node1
    networks:
      - storage_net

  storage_node_2:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/usr/local/bin/storage_node"]
    restart: on-failure
    depends_on:
      meta_service:
        condition: service_healthy
    environment:
      - NODE_NAME=storage_node_2
      - NODE_PORT=8002
      - STORAGE_DIR=/data/node2
      - META_ENABLED=true
      - META_ENDPOINT=http://meta_service:8091
      - META_REQUIRE_ENDPOINT=true
      - META_RPC_AUTH_TOKEN=dev-meta-token
      - META_DSN=${META_DSN:-}
      - NODE_HEARTBEAT_INTERVAL_SEC=3
      - STORAGE_IO_WORKERS=${STORAGE_IO_WORKERS:-2}
      - STORAGE_DURABILITY_MODE=${STORAGE_DURABILITY_MODE:-sync}
    volumes:
      - storage_data_2:/data/node2
    networks:
      - storage_net

  storage_node_3:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/usr/local/bin/storage_node"]
    restart: on-failure
    depends_on:
      meta_service:
        condition: service_healthy
    environment:
      - NODE_NAME=storage_node_3
      - NODE_PORT=8003
      - STORAGE_DIR=/data/node3
      - META_ENABLED=true
      - META_ENDPOINT=http://meta_service:8091
      - META_REQUIRE_ENDPOINT=true
      - META_RPC_AUTH_TOKEN=dev-meta-token
      - META_DSN=${META_DSN:-}
      - NODE_HEARTBEAT_INTERVAL_SEC=3
      - STORAGE_IO_WORKERS=${STORAGE_IO_WORKERS:-2}
      - STORAGE_DURABILITY_MODE=${STORAGE_DURABILITY_MODE:-sync}
    volumes:
      - storage_data_3:/data/node3
    networks:
      - storage_net

  storage_node_4:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/usr/local/bin/storage_node"]
    restart: on-failure
    depends_on:
      meta_service:
        condition: service_healthy
    environment:
      - NODE_NAME=storage_node_4
      - NODE_PORT=8004
      - STORAGE_DIR=/data/node4
      - META_ENABLED=true
      - META_ENDPOINT=http://meta_service:8091
      - META_REQUIRE_ENDPOINT=true
      - META_RPC_AUTH_TOKEN=dev-meta-token
      - META_DSN=${META_DSN:-}
      - NODE_HEARTBEAT_INTERVAL_SEC=3
      - STORAGE_IO_WORKERS=${STORAGE_IO_WORKERS:-2}
      - STORAGE_DURABILITY_MODE=${STORAGE_DURABILITY_MODE:-sync}
    volumes:
      - storage_data_4:/data/node4
    networks:
      - storage_net

  storage_node_5:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/usr/local/bin/storage_node"]
    restart: on-failure
    depends_on:
      meta_service:
        condition: service_healthy
    environment:
      - NODE_NAME=storage_node_5
      - NODE_PORT=8005
      - STORAGE_DIR=/data/node5
      - META_ENABLED=true
      - META_ENDPOINT=http://meta_service:8091
      - META_REQUIRE_ENDPOINT=true
      - META_RPC_AUTH_TOKEN=dev-meta-token
      - META_DSN=${META_DSN:-}
      - NODE_HEARTBEAT_INTERVAL_SEC=3
      - STORAGE_IO_WORKERS=${STORAGE_IO_WORKERS:-2}
      - STORAGE_DURABILITY_MODE=${STORAGE_DURABILITY_MODE:-sync}
    volumes:
      - storage_data_5:/data/node5
    networks:
      - storage_net

  storage_node_6:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/usr/local/bin/storage_node"]
    restart: on-failure
    depends_on:
      meta_service:
        condition: service_healthy
    environment:
      - NODE_NAME=storage_node_6
      - NODE_PORT=8006
      - STORAGE_DIR=/data/node6
      - META_ENABLED=true
      - META_ENDPOINT=http://meta_service:8091
      - META_REQUIRE_ENDPOINT=true
      - META_RPC_AUTH_TOKEN=dev-meta-token
      - META_DSN=${META_DSN:-}
      - NODE_HEARTBEAT_INTERVAL_SEC=3
      - STORAGE_IO_WORKERS=${STORAGE_IO_WORKERS:-2}
      - STORAGE_DURABILITY_MODE=${STORAGE_DURABILITY_MODE:-sync}
    volumes:
      - storage_data_6:/data/node6
    networks:
      - storage_net

  # ---------------------------------------------------------------------------
  # Tiering Worker
  # ---------------------------------------------------------------------------
  tiering_worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/usr/local/bin/tiering_worker"]
    restart: on-failure
    environment:
      - META_ENABLED=true
      - META_ENDPOINT=http://meta_service:8091
      - META_REQUIRE_ENDPOINT=true
      - META_RPC_AUTH_TOKEN=dev-meta-token
      - META_DSN=${META_DSN:-}
      - TIERING_WORKER_POLL_SEC=2
      - TIERING_POLICY_PERIOD_SEC=300
      - TIERING_POLICY_VARIANT=A
      - TIERING_TRIGGER_MODE=periodic
      - TIERING_THRESHOLD_CHECK_SEC=10
      - TIERING_THRESHOLD_COOLDOWN_SEC=60
      - AGE_THRESHOLD_SEC=3600
      - MAX_OBJECTS_PER_ROUND=200
      - MAX_BYTES_PER_ROUND=1073741824
      - HOT_PRESSURE_DISK_PCT=80
      - HOT_PRESSURE_QUEUE_DEPTH=1000
      - TIERING_POLICY_LEADER_RETRY_SEC=2
      - TIERING_POLICY_LEADER_LOCK_KEY=42042
      - TIERING_LEADER_STALE_SEC=10
      - TIERING_TASK_MAX_RETRY_COUNT=8
      - WORKER_EC_SHARD_WRITE_PARALLELISM=2
      - TIERING_WORKER_TASK_TYPE=ALL
    depends_on:
      meta_service:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - storage_net

networks:
  storage_net:
    driver: bridge

volumes:
  tikv_pd_data:
  tikv_store_data:
  storage_data_1:
  storage_data_2:
  storage_data_3:
  storage_data_4:
  storage_data_5:
  storage_data_6:
